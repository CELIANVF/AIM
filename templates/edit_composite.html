{% extends "layout.html" %}

{% block title %}Modifier Arc{% endblock %}

{% block content %}
<h1>Modifier un arc</h1>
<form method="post">
    <label>Nom/Référence: <input type="text" name="name" value="{{ composite.name }}" required></label><br>
    <label>Type:
        <select name="type">
            <option value="BB" {% if composite.type == 'BB' %}selected{% endif %}>BB (Bare Bow)</option>
            <option value="CL" {% if composite.type == 'CL' %}selected{% endif %}>CL (Classique)</option>
        </select>
    </label><br>
    <label>Statut:
        <select name="status">
            <option value="club" {% if composite.status == 'club' %}selected{% endif %}>Au club</option>
            <option value="loan" {% if composite.status == 'loan' %}selected{% endif %}>En prêt</option>
        </select>
    </label><br>
    <h2>Composants</h2>
    <div class="component-controls-global" style="margin-bottom:8px">
        <label class="small muted">Filtrer les composants:</label>
        <select id="global-filter-field"></select>
        <select id="global-filter-value" style="display:none"></select>
        <input id="global-filter-text" type="text" placeholder="Recherche libre" style="min-width:160px">
        <button type="button" class="btn btn-outline" id="global-filter-apply">Appliquer</button>
        <button type="button" class="btn btn-outline" id="global-filter-clear">Réinitialiser</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <button type="button" class="btn btn-outline" id="global-select-visible">Sélectionner visibles</button>
        <button type="button" class="btn btn-outline" id="global-deselect-visible">Désélectionner visibles</button>
    </div>
    <div id="components-list-global" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;max-height:420px;overflow:auto;padding-right:6px">
    {% for p in products %}
    <div class="component-card" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" name="components" value="{{ p.id }}" {% if p in composite.components %}checked{% endif %}
                data-brand="{{ p.brand|e }}" data-state="{{ p.state|e }}" data-size="{{ p.size|e }}" data-power="{{ p.power|e }}" data-model="{{ p.model|e }}" data-location="{{ p.location|e }}" data-comments="{{ p.comments|e }}"
                {% if p.custom_values %}
                    {% for k, v in p.custom_values.items() %}
                        data-custom-{{ k.replace(' ', '_')|lower }}="{{ v|e }}"
                    {% endfor %}
                {% endif %}
            >
            <div style="flex:1">
                <div style="font-weight:600"><a href="/edit_product/{{ p.id }}" target="_blank" rel="noopener">{{ p.brand }}{% if p.model %} {{ p.model }}{% endif %}</a></div>
                <div class="small muted">{{ p.category.name }}{% if p.size %} • {{ p.size }}{% endif %}{% if p.power %} • {{ p.power }}{% endif %}</div>
                <div class="small muted" style="margin-top:6px">État: {% if p.state == 'stock' %}Disponible{% elif p.state == 'loan' %}En prêt{% elif p.state == 'broken' %}Cassé{% else %}{{ p.state }}{% endif %} • Localisation: {% if p.location == 'club' %}Au club{% elif p.location == 'loan' %}En prêt{% else %}{{ p.location }}{% endif %}</div>
                {% if p.comments %}<div class="small" style="margin-top:6px">💬 {{ p.comments }}</div>{% endif %}
            </div>
        </label>
    </div>
    {% endfor %}
    </div>
    <button class="btn" type="submit">Modifier</button>
</form>
<script>
// Global filter for components list in edit composite
document.addEventListener('DOMContentLoaded', function(){
    const list = document.getElementById('components-list-global');
    if (!list) return;
    const items = Array.from(list.querySelectorAll('.component-item input'));
    // fallback: match new card structure
    const checkboxItems = Array.from(list.querySelectorAll('input[type="checkbox"][name="components"]'));
    const fieldSel = document.getElementById('global-filter-field');
    const valueSel = document.getElementById('global-filter-value');
    const textInput = document.getElementById('global-filter-text');
    const applyBtn = document.getElementById('global-filter-apply');
    const clearBtn = document.getElementById('global-filter-clear');

    const valueMap = {};
    items.forEach(i=>{
        Array.from(i.attributes).forEach(a=>{
            if (!a.name.startsWith('data-')) return;
            const key = a.name; const val = (a.value||'').trim(); if (!val) return;
            if (!valueMap[key]) valueMap[key]=new Set(); valueMap[key].add(val);
        });
    });
    fieldSel.innerHTML=''; const anyOpt=document.createElement('option'); anyOpt.value='any'; anyOpt.textContent='Tous (texte)'; fieldSel.appendChild(anyOpt);
    ['data-brand','data-state','data-size','data-power','data-model'].forEach(k=>{ if (valueMap[k]){ const o=document.createElement('option'); o.value=k; o.textContent=k.replace('data-','').toUpperCase(); fieldSel.appendChild(o);} });
    Object.keys(valueMap).filter(k=>k.startsWith('data-custom-')).forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k.replace('data-custom-','').replace(/_/g,' '); fieldSel.appendChild(o); });

    fieldSel.addEventListener('change', function(){ const v=this.value; if (v==='any'){ valueSel.style.display='none'; textInput.style.display='inline-block'; } else { valueSel.innerHTML=''; const a=document.createElement('option'); a.value=''; a.textContent='-- (tous) --'; valueSel.appendChild(a); Array.from(valueMap[v]||[]).sort().forEach(val=>{ const o=document.createElement('option'); o.value=val; o.textContent=val; valueSel.appendChild(o); }); valueSel.style.display='inline-block'; textInput.style.display='none'; } });
    fieldSel.dispatchEvent(new Event('change'));

    function applyFilter(){
        const field=fieldSel.value; const val=(field==='any')? (textInput.value||'').toLowerCase().trim() : (valueSel.value||'').toLowerCase().trim();
        items.forEach(i=>{ const lab=i.closest('.component-item'); let source=''; if (field==='any') source = lab.textContent || ''; else source = (i.getAttribute(field)||''); if (!val) lab.style.display=''; else lab.style.display = source.toLowerCase().indexOf(val)!==-1 ? '' : 'none'; });
    }
    applyBtn.addEventListener('click', applyFilter);
    clearBtn.addEventListener('click', function(){ fieldSel.value='any'; textInput.value=''; valueSel.innerHTML=''; valueSel.style.display='none'; textInput.style.display='inline-block'; checkboxItems.forEach(i=>{ const lab=i.closest('.component-item') || i.closest('.component-card'); if (lab) lab.style.display=''; }); });

    // select/deselect visible global
    const selVisible = document.getElementById('global-select-visible');
    const deselVisible = document.getElementById('global-deselect-visible');
    if (selVisible) selVisible.addEventListener('click', function(){ checkboxItems.forEach(i=>{ const lab=i.closest('.component-item') || i.closest('.component-card'); if (lab && lab.style.display !== 'none') i.checked = true; }); });
    if (deselVisible) deselVisible.addEventListener('click', function(){ checkboxItems.forEach(i=>{ const lab=i.closest('.component-item') || i.closest('.component-card'); if (lab && lab.style.display !== 'none') i.checked = false; }); });
});
</script>
{% endblock %}
