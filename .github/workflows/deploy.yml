# Déploiement automatique : à chaque push sur `main`, SSH vers le VPS puis
# git pull + deps + migrations + restart du service Gunicorn.
#
# Secrets GitHub (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST     — IP ou domaine du serveur (ex. matos.anc93.com)
#   DEPLOY_USER     — utilisateur SSH (ex. celian)
#   DEPLOY_SSH_KEY  — clé privée SSH (PEM) dont la clé publique est dans ~/.ssh/authorized_keys sur le serveur
#
# Prérequis sur le serveur :
#   - dépôt git cloné (même remote que GitHub), branche main à jour une première fois
#   - sudo NOPASSWD pour : systemctl restart aim (et éventuellement nginx)
#   - accès git : pour un dépôt privé, clé de déploiement ou token configuré sur le serveur (git pull)

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aim
  cancel-in-progress: false

env:
  # Chemin absolu du dépôt sur le VPS (adapter si besoin)
  APP_DIR: /home/celian/AIM

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ${{ env.APP_DIR }}
            bash scripts/deploy-remote.sh
